name: Validate OCF repository

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  validate-repository:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: reference/validator/package-lock.json

      - name: Install validator dependencies
        working-directory: reference/validator
        run: npm ci

      - name: Regenerate schema projections and semantic index
        run: |
          node tools/generate-schema-core.js
          node tools/generate-schema-index.js

      - name: Validate example OCF JSON files
        run: node reference/validator/validate.js

      - name: Check core projection and reference behavior
        run: |
          node tools/check-schema-copies.js
          node tools/check-schema-core.js
          node reference/test/run.js

      - name: Regenerate checked-in HTML docs
        run: node tools/generate-doc-html.js

      - name: Check worked example snippets
        run: node tools/check-worked-example-snippets.js

      - name: Check localized docs are current
        run: node tools/check-translation-staleness.js

      - name: Check generated files are current
        run: git diff --exit-code
